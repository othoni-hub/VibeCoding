<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIVE - Programme de Renforcement Musculaire</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .font-neon {
            font-family: 'Orbitron', sans-serif;
        }
        
        /* Effets de lueur Néon globaux */
        .glow-blue { box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .glow-pink { box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); }
        
        /* Cartes retournées (Flip Cards) */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1rem;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="min-h-screen text-slate-200 pb-12 antialiased">

    <!-- HEADER ACTIVE AVEC ACROYNME VIBRANT -->
    <header class="bg-slate-950/80 backdrop-blur-md text-center py-8 px-4 shadow-2xl border-b border-slate-800 relative overflow-hidden">
        <div class="absolute inset-x-0 bottom-0 h-[2px] bg-gradient-to-r from-cyan-500 via-purple-500 to-pink-500 animate-pulse"></div>
        
        <h1 class="text-5xl md:text-6xl font-black tracking-wider uppercase font-neon text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-white to-pink-400 drop-shadow-[0_0_20px_rgba(6,182,212,0.5)]">
            ACTIVE
        </h1>
        
        <!-- Définition officielle affichée -->
        <div class="mt-3 max-w-2xl mx-auto px-4 py-1.5 rounded-xl bg-slate-900/90 border border-slate-800 text-xs md:text-sm font-medium tracking-wide text-slate-300">
            <span class="text-cyan-400 font-bold">A</span>dos 
            <span class="text-cyan-400 font-bold">C</span>onscient·e·s, 
            <span class="text-amber-400 font-bold">T</span>onique·s, 
            <span class="text-lime-400 font-bold">I</span>ntensif·ve·s, 
            <span class="text-purple-400 font-bold">V</span>ibrant·e·s & 
            <span class="text-pink-400 font-bold">É</span>quilibré·e·s
        </div>
        
        <p class="text-slate-500 mt-3 text-xs md:text-sm uppercase tracking-widest font-neon">15 minutes de renforcement quotidien adapté à ta physiologie</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        
        <!-- SELECTEUR DE PROFIL CYBER -->
        <section class="flex justify-center gap-4 mb-10">
            <button id="btn-garcons" onclick="switchProfile('garcons')" class="flex-1 max-w-xs py-4 px-6 rounded-2xl font-neon font-bold text-lg uppercase tracking-wider transition-all transform hover:scale-105 bg-slate-900 border-2 border-cyan-500 text-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                ⚡ Garçons
            </button>
            <button id="btn-filles" onclick="switchProfile('filles')" class="flex-1 max-w-xs py-4 px-6 rounded-2xl font-neon font-bold text-lg uppercase tracking-wider transition-all transform hover:scale-105 bg-slate-950 border-2 border-slate-900 text-slate-600 hover:text-pink-400 hover:border-pink-500/50">
                ✨ Filles
            </button>
        </section>

        <!-- CONTEXTE PHYSIO NÉON -->
        <div id="info-bulle" class="bg-slate-900/60 border-l-4 border-cyan-500 p-4 rounded-r-xl mb-8 shadow-2xl backdrop-blur-sm text-sm text-slate-300 glow-blue">
            <!-- Injecté par JS -->
        </div>

        <!-- MATRIX GRIDS DE LA SEMAINE -->
        <div id="programme-container" class="grid grid-cols-1 md:grid-cols-5 gap-6">
            <!-- Injecté dynamiquement par JavaScript -->
        </div>

    </main>

    <!-- FOOTER CONSEILS NÉON + CRÉDITS -->
    <footer class="max-w-4xl mx-auto px-4 mt-12 text-center space-y-6">
        <div class="bg-slate-950 border border-slate-800 p-5 rounded-2xl shadow-2xl flex flex-wrap justify-around items-center gap-4 text-xs font-neon font-semibold uppercase tracking-wider text-slate-400">
            <div class="flex items-center gap-2"><span class="text-cyan-400 text-sm">➔</span> Régularité</div>
            <div class="flex items-center gap-2"><span class="text-amber-400 text-sm">➔</span> Mouvement Propre</div>
            <div class="flex items-center gap-2"><span class="text-lime-400 text-sm">➔</span> Hydratation</div>
            <div class="flex items-center gap-2"><span class="text-rose-500 text-sm">➔</span> Zéro Douleur</div>
        </div>
        
        <!-- Zone de crédits personnalisée -->
        <div class="text-slate-600 text-[11px] tracking-wide font-light">
            Créé par <span class="text-slate-400 font-medium">Olivier Thöni</span>, vibe-codé avec l’aide de <span class="text-cyan-600/80 font-neon font-bold">Gemini 3.5 Flash</span>
        </div>
    </footer>

    <!-- LOGIQUE ET DONNÉES -->
    <script>
        const data = {
            garcons: {
                themeColor: "border-cyan-500 glow-blue",
                badgeClass: "bg-cyan-950 text-cyan-400 border border-cyan-500/30",
                info: "<strong>⚡ Focus Physio Garçons :</strong> La poussée de croissance peut perturber ta coordination. On canalise l'énergie sur le contrôle du mouvement, la posture et le gainage !",
                jours: [
                    { name: "Lundi", focus: "Bas du corps & Cardio", neonText: "text-cyan-400", borderNeon: "border-cyan-500/30 shadow-[0_0_10px_rgba(6,182,212,0.15)]", exercises: [
                        { title: "12 Squats", desc: "Fesses à hauteur des genoux, genoux dans l'axe, dos bien droit. Contrôle la descente. (3 Séries)" },
                        { title: "10 Fentes Alternées", desc: "Fais un grand pas en avant, descends le genou arrière frôler le sol. Buste vertical. (3 Séries)" }
                    ]},
                    { name: "Mardi", focus: "Haut du corps & Gainage", neonText: "text-amber-400", borderNeon: "border-amber-500/30 shadow-[0_0_10px_rgba(245,158,11,0.15)]", exercises: [
                        { title: "6 à 10 Pompes", desc: "Corps parfaitement aligné. Pose les genoux au sol si besoin pour garder la colonne bien droite. (3 Séries)" },
                        { title: "30s Planche", desc: "Sur les coudes et pieds. Aspire le nombril vers la colonne, ne creuse jamais le dos. (3 Séries)" }
                    ]},
                    { name: "Mercredi", focus: "Agilité & Abdos", neonText: "text-lime-400", borderNeon: "border-lime-500/30 shadow-[0_0_10px_rgba(132,204,22,0.15)]", exercises: [
                        { title: "8 Burpees", desc: "Accroupi·e, jette les pieds en arrière, ramène-les et saute. Gaine fort la sangle abdo ! (3 Séries)" },
                        { title: "15 Crunches", desc: "Allongé·e, genoux fléchis. Décolle juste les épaules en faisant glisser les mains sur les cuisses. (3 Séries)" }
                    ]},
                    { name: "Jeudi", focus: "Chaîne Postérieure", neonText: "text-slate-400", borderNeon: "border-slate-500/30 shadow-[0_0_10px_rgba(148,163,184,0.15)]", exercises: [
                        { title: "12 Ext. Mollets", desc: "Monte sur les pointes depuis une marche de façon explosive, redescends lentement. (3 Séries)" },
                        { title: "12 Supermans", desc: "Sur le ventre, décolle légèrement la poitrine et les jambes. Renforce le bas du dos. (3 Séries)" }
                    ]},
                    { name: "Vendredi", focus: "Full Body - Défi", neonText: "text-orange-500", borderNeon: "border-orange-500/30 shadow-[0_0_10px_rgba(249,115,22,0.15)]", exercises: [
                        { title: "Circuit Training", desc: "Enchaîne sans repos : 10 Squats ➔ 8 Pompes ➔ 10 Fentes ➔ 30s Planche. (2 tours complets)" },
                        { title: "Récupération", desc: "Prends exactement 1 minute de repos complet entre les 2 tours. Respire profondément." }
                    ]}
                ]
            },
            filles: {
                themeColor: "border-pink-500 glow-pink",
                badgeClass: "bg-pink-950 text-pink-400 border border-pink-500/30",
                info: "<strong>✨ Focus Physio Filles :</strong> L'élargissement du bassin modifie l'axe des genoux. On renforce la stabilité (fessiers) et la tonicité du haut du corps !",
                jours: [
                    { name: "Lundi", focus: "Stabilité & Fessiers", neonText: "text-cyan-400", borderNeon: "border-cyan-500/30 shadow-[0_0_10px_rgba(6,182,212,0.15)]", exercises: [
                        { title: "12 Squats Profonds", desc: "Pousse tes genoux vers l'extérieur à la descente pour verrouiller et protéger l'articulation. (3 Séries)" },
                        { title: "12 Ponts Fessiers", desc: "Sur le dos, pieds à plat, décolle le bassin au maximum en serrant fort les fessiers. (3 Séries)" }
                    ]},
                    { name: "Mardi", focus: "Haut & Posture", neonText: "text-amber-400", borderNeon: "border-amber-500/30 shadow-[0_0_10px_rgba(245,158,11,0.15)]", exercises: [
                        { title: "8 Pompes (Genoux)", desc: "Mains sous les épaules, descends la poitrine au sol en gardant le bassin bien verrouillé. (3 Séries)" },
                        { title: "30s Planche", desc: "Gainage stable sur les coudes. Rentre le ventre pour engager les abdos profonds (transverse). (3 Séries)" }
                    ]},
                    { name: "Mercredi", focus: "Tonicité & Cardio", neonText: "text-lime-400", borderNeon: "border-lime-500/30 shadow-[0_0_10px_rgba(132,204,22,0.15)]", exercises: [
                        { title: "12 Fentes Arrière", desc: "Grand pas en arrière. Plus protecteur pour les genoux et idéal pour la stabilité des hanches. (3 Séries)" },
                        { title: "20 Jumping Jacks", desc: "Saute en ouvrant bras/jambes simultanément. Maintiens un rythme fluide et tonique. (3 Séries)" }
                    ]},
                    { name: "Jeudi", focus: "Dos & Abdos", neonText: "text-slate-400", borderNeon: "border-slate-500/30 shadow-[0_0_10px_rgba(148,163,184,0.15)]", exercises: [
                        { title: "12 Supermans", desc: "Sur le ventre, décolle le buste. Parfait pour redresser le dos et gommer l'effet avachi des écrans. (3 Séries)" },
                        { title: "30s Planche Lat.", desc: "Sur le coude de profil, décolle le bassin (15s gauche / 15s droite). Option sur les genoux. (3 Séries)" }
                    ]},
                    { name: "Vendredi", focus: "Full Body - Défi", neonText: "text-orange-500", borderNeon: "border-orange-500/30 shadow-[0_0_10px_rgba(249,115,22,0.15)]", exercises: [
                        { title: "Circuit Training", desc: "Enchaîne sans repos : 10 Ponts Fessiers ➔ 6 Pompes G. ➔ 10 Squats ➔ 30s Planche. (2 tours)" },
                        { title: "Récupération", desc: "Prends 1 minute de repos complet entre les 2 tours. Hydrate-toi par petites gorgées." }
                    ]}
                ]
            }
        };

        function switchProfile(profile) {
            const btnG = document.getElementById('btn-garcons');
            const btnF = document.getElementById('btn-filles');
            const infoBulle = document.getElementById('info-bulle');
            
            if(profile === 'garcons') {
                btnG.className = "flex-1 max-w-xs py-4 px-6 rounded-2xl font-neon font-bold text-lg uppercase tracking-wider transition-all transform hover:scale-105 bg-slate-900 border-2 border-cyan-500 text-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.4)]";
                btnF.className = "flex-1 max-w-xs py-4 px-6 rounded-2xl font-neon font-bold text-lg uppercase tracking-wider transition-all transform hover:scale-105 bg-slate-950 border-2 border-slate-900 text-slate-600 hover:text-pink-400 hover:border-pink-500/30";
                infoBulle.className = "bg-slate-900/60 border-l-4 border-cyan-500 p-4 rounded-r-xl mb-8 shadow-2xl text-sm text-slate-300 glow-blue";
            } else {
                btnF.className = "flex-1 max-w-xs py-4 px-6 rounded-2xl font-neon font-bold text-lg uppercase tracking-wider transition-all transform hover:scale-105 bg-slate-900 border-2 border-pink-500 text-pink-400 shadow-[0_0_15px_rgba(244,63,94,0.4)]";
                btnG.className = "flex-1 max-w-xs py-4 px-6 rounded-2xl font-neon font-bold text-lg uppercase tracking-wider transition-all transform hover:scale-105 bg-slate-950 border-2 border-slate-900 text-slate-600 hover:text-cyan-400 hover:border-cyan-500/30";
                infoBulle.className = "bg-slate-900/60 border-l-4 border-pink-500 p-4 rounded-r-xl mb-8 shadow-2xl text-sm text-slate-300 glow-pink";
            }

            infoBulle.innerHTML = data[profile].info;
            renderCards(profile);
        }

        function renderCards(profile) {
            const container = document.getElementById('programme-container');
            const currentData = data[profile];
            container.innerHTML = "";

            currentData.jours.forEach((jour) => {
                let exercisesHTML = "";

                jour.exercises.forEach((exo, index) => {
                    exercisesHTML += `
                        <div class="flip-card h-28 cursor-pointer" onclick="this.classList.toggle('flipped')">
                            <div class="flip-card-inner h-full w-full">
                                <!-- Recto -->
                                <div class="flip-card-front bg-slate-900/90 p-3 flex flex-col justify-center items-center border ${jour.borderNeon} rounded-xl transition-all hover:bg-slate-850">
                                    <span class="text-[10px] uppercase font-semibold text-slate-500 tracking-widest mb-1">EXO 0${index + 1}</span>
                                    <span class="font-bold text-sm md:text-base text-white text-center leading-tight tracking-wide">${exo.title}</span>
                                    <span class="${jour.neonText} text-[9px] font-neon font-semibold mt-1.5 flex items-center gap-1 opacity-80">DÉTAILS ➕</span>
                                </div>
                                <!-- Verso -->
                                <div class="flip-card-back bg-slate-950 text-slate-200 border-2 ${profile === 'garcons' ? 'border-cyan-500/50' : 'border-pink-500/50'} p-3 flex justify-center items-center overflow-y-auto shadow-inner rounded-xl">
                                    <p class="text-xs text-left leading-relaxed text-slate-300">${exo.desc}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                const jourCard = `
                    <div class="bg-slate-950/40 border border-slate-800/80 rounded-3xl p-4 shadow-xl flex flex-col justify-between backdrop-blur-md relative overflow-hidden">
                        <div>
                            <!-- Header Jour -->
                            <div class="border border-slate-700/50 bg-slate-900 text-white font-neon font-extrabold text-sm uppercase tracking-widest py-1.5 px-3 rounded-xl text-center shadow-md ${jour.neonText}">
                                ${jour.name}
                            </div>
                            <div class="text-center my-3">
                                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider leading-tight">${jour.focus}</h3>
                            </div>
                            <div class="space-y-3 mt-4">
                                ${exercisesHTML}
                            </div>
                        </div>
                        <div class="mt-4 text-center">
                            <span class="inline-block ${currentData.badgeClass} text-[9px] font-neon font-bold px-2.5 py-0.5 rounded-full tracking-wider uppercase">
                                ⏱️ 15 MIN
                            </span>
                        </div>
                    </div>
                `;
                container.innerHTML += jourCard;
            });
        }

        switchProfile('garcons');
    </script>
</body>
</html>
