        // --- 3. LOGIQUE D'ASTRONOMIE DE POSITION CORRIGÉE ---
        function getLocalSiderealTime(date, longitude) {
            // Calcul du temps universel (UT) en siècles depuis J2000.0
            const jd = (date.getTime() / 86400000) + 2440587.5;
            const t = (jd - 2451545.0) / 36525;
            
            // Temps sidéral moyen à Greenwich (GMST) en degrés
            let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * t * t - t * t * t / 38710000;
            gmst = gmst % 360;
            if (gmst < 0) gmst += 360;

            // Temps sidéral local (LST) en heures
            let lst = (gmst + longitude) / 15.0;
            lst = lst % 24;
            if (lst < 0) lst += 24;
            return lst;
        }

        function skyToCanvasCoords(ra, dec, lst, lat, width, height, zoom, offsetX, offsetY, targetAzimuth) {
            const raRad = ra * 15 * Math.PI / 180;
            const decRad = dec * Math.PI / 180;
            const latRad = lat * Math.PI / 180;
            const lstRad = lst * 15 * Math.PI / 180;

            // Angle horaire (HA)
            let haRad = lstRad - raRad;

            // Hauteur (Alt)
            const sinAlt = Math.sin(decRad) * Math.sin(latRad) + Math.cos(decRad) * Math.cos(latRad) * Math.cos(haRad);
            const alt = Math.asin(sinAlt);

            // Azimut (Az)
            const cosAz = (Math.sin(decRad) - Math.sin(alt) * Math.sin(latRad)) / (Math.cos(alt) * Math.cos(latRad));
            let az = Math.acos(Math.min(1, Math.max(-1, cosAz)));
            if (Math.sin(haRad) > 0) {
                az = 2 * Math.PI - az;
            }

            // Rotation liée à la boussole sélectionnée par l'utilisateur
            const rotAz = az - (targetAzimuth * Math.PI / 180);

            const r = (Math.PI / 2 - alt) / (Math.PI / 2);
            const maxRadius = Math.min(width, height) * 0.45 * zoom;

            const cx = width / 2 + offsetX;
            const cy = height / 2 + offsetY;

            const x = cx + maxRadius * r * Math.sin(rotAz);
            const y = cy - maxRadius * r * Math.cos(rotAz);

            return { x, y, visible: alt > -0.02, alt: alt * 180 / Math.PI };
        }

        function getPlanetsPositions(date) {
            const jd = (date.getTime() / 86400000) + 2440587.5;
            const d = jd - 2451545.0; // Jours depuis J2000.0

            // Calcul rigoureux du Soleil (coordonnées écliptiques -> équatoriales)
            let L = (280.466 + 0.9856474 * d) % 360;
            let g = (357.528 + 0.9856003 * d) % 360;
            if (L < 0) L += 360;
            if (g < 0) g += 360;
            
            let lRad = L * Math.PI / 180;
            let gRad = g * Math.PI / 180;
            
            // Longitude écliptique vraie du Soleil
            let lambda = L + 1.915 * Math.sin(gRad) + 0.020 * Math.sin(2 * gRad);
            let lamRad = lambda * Math.PI / 180;
            
            // Obliquité de l'écliptique
            let eps = (23.439 - 0.0000004 * d) * Math.PI / 180;
            
            // Ascension droite (RA) et Déclinaison (DEC) du Soleil
            let sunRaRad = Math.atan2(Math.cos(eps) * Math.sin(lamRad), Math.cos(lamRad));
            let sunDecRad = Math.asin(Math.sin(eps) * Math.sin(lamRad));
            
            let sunRa = (sunRaRad * 180 / Math.PI / 15);
            if (sunRa < 0) sunRa += 24;
            let sunDec = sunDecRad * 180 / Math.PI;

            // Base des objets du système solaire calculés via approximations orbites circulaires
            const objects = [
                { name: "Soleil", icon: "☀️", ra: sunRa, dec: sunDec, isSun: true },
                { name: "Vénus", icon: "✨", N: 76.6806, i: 3.3946, w: 54.8910, a: 0.723332, e: 0.006773, M: 50.115 + 1.6021302244 * d },
                { name: "Mars", icon: "🔴", N: 49.5574, i: 1.8497, w: 286.5016, a: 1.523662, e: 0.093412, M: 18.6514 + 0.5240207766 * d },
                { name: "Jupiter", icon: "🪐", N: 100.4542, i: 1.3030, w: 273.6777, a: 5.203363, e: 0.048393, M: 19.8950 + 0.0830853001 * d },
                { name: "Saturne", icon: "🪐", N: 113.6655, i: 2.4844, w: 339.3939, a: 9.537070, e: 0.054150, M: 317.0206 + 0.0334442282 * d },
                { name: "Uranus", icon: "🔵", N: 74.0060, i: 0.7733, w: 96.9988, a: 19.19126, e: 0.047257, M: 142.2386 + 0.01172834 * d }
            ];

            const result = objects.map(p => {
                if(p.isSun) return p;
                let M = p.M % 360;
                if (M < 0) M += 360;
                let mRad = M * Math.PI / 180;
                let l = mRad + 2 * p.e * Math.sin(mRad); 
                let ra = (l * 180 / Math.PI / 15) % 24;
                if (ra < 0) ra += 24;
                let dec = 23.44 * Math.sin(l);
                return { name: p.name, icon: p.icon, ra, dec, isSun: false };
            });

            // Lune (Modèle de perturbation de base)
            let moonMeanLong = (218.316 + 13.176396 * d) % 360;
            let moonMeanAnomaly = (134.963 + 13.064993 * d) % 360;
            let moonLonRad = (moonMeanLong + 6.289 * Math.sin(moonMeanAnomaly * Math.PI / 180)) * Math.PI / 180;
            
            let moonRa = (moonLonRad * 180 / Math.PI / 15) % 24;
            if (moonRa < 0) moonRa += 24;
            let moonDec = 23.44 * Math.sin(moonLonRad);

            result.push({ name: "Lune", icon: "🌙", ra: moonRa, dec: moonDec, isMoon: true, isSun: false });

            return result;
        }

        // --- 4. ENGINE DE RENDU VISUEL (CANVAS) ---
        function renderSky() {
            const w = canvas.width = canvas.parentElement.clientWidth;
            const h = canvas.height = canvas.parentElement.clientHeight;

            ctx.clearRect(0, 0, w, h);

            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const targetAzimuth = parseFloat(document.getElementById('viewAzimuth').value);
            const lst = getLocalSiderealTime(currentDate, lon);

            const azLabels = { "0": "N", "90": "E", "180": "S", "270": "O" };
            document.getElementById('compassTop').innerText = azLabels[document.getElementById('viewAzimuth').value] || "N";

            const cx = w / 2 + viewState.offsetX;
            const cy = h / 2 + viewState.offsetY;
            const baseRadius = Math.min(w, h) * 0.45 * viewState.zoom;

            const showConstellations = document.getElementById('showConstellations').checked;
            const showGrid = document.getElementById('showGrid').checked;
            const showLabels = document.getElementById('showLabels').checked;

            // Fond d'horizon
            ctx.fillStyle = "#050b18";
            ctx.beginPath();
            ctx.arc(cx, cy, baseRadius, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Grilles : Équateur et Écliptique
            if (showGrid) {
                ctx.strokeStyle = "rgba(99, 102, 241, 0.2)";
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                for (let hour = 0; hour <= 24; hour += 0.5) {
                    let pt = skyToCanvasCoords(hour, 0, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                    if (hour === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();

                ctx.strokeStyle = "rgba(234, 179, 8, 0.25)";
                ctx.beginPath();
                for (let hour = 0; hour <= 24; hour += 0.5) {
                    let dec = 23.44 * Math.sin((hour / 24) * 2 * Math.PI);
                    let pt = skyToCanvasCoords(hour, dec, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                    if (hour === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Dessiner les lignes de constellations
            if (showConstellations) {
                ctx.strokeStyle = "rgba(56, 189, 248, 0.35)";
                ctx.lineWidth = 1.2;
                CONSTELLATIONS.forEach(c => {
                    ctx.beginPath();
                    let first = true;
                    
                    c.stars.forEach(s => {
                        let pt = skyToCanvasCoords(s.ra, s.dec, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                        if (pt.visible) {
                            if (first) { ctx.moveTo(pt.x, pt.y); first = false; }
                            else ctx.lineTo(pt.x, pt.y);
                        }
                    });
                    if (c.closed) ctx.closePath();
                    ctx.stroke();

                    c.stars.forEach(s => {
                        let pt = skyToCanvasCoords(s.ra, s.dec, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                        if (pt.visible) {
                            ctx.fillStyle = "rgba(165, 243, 252, 0.8)";
                            ctx.beginPath();
                            ctx.arc(pt.x, pt.y, 2.2, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                    });

                    if (showLabels) {
                        let labelPt = skyToCanvasCoords(c.stars[0].ra, c.stars[0].dec, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                        if (labelPt.visible) {
                            ctx.fillStyle = "rgba(148, 163, 184, 0.8)";
                            ctx.font = "10px sans-serif";
                            ctx.fillText(c.name, labelPt.x + 10, labelPt.y - 6);
                        }
                    }
                });
            }

            // Étoiles nommées principales
            STARS.forEach(star => {
                let pt = skyToCanvasCoords(star.ra, star.dec, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                if (pt.visible) {
                    let size = Math.max(1.8, 4.5 - star.mag);
                    
                    ctx.fillStyle = "#ffffff";
                    ctx.shadowBlur = size * 2;
                    ctx.shadowColor = "#67e8f9";
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, size, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    if (showLabels && (star.mag < 2.5 || ["Bellatrix", "Alcor", "Mizar", "Rigel", "Mintaka", "Alnilam", "Alnitak", "Algenib", "Markab", "Scheat", "Rasalhague"].includes(star.name))) {
                        ctx.fillStyle = "#cbd5e1";
                        ctx.font = "11px sans-serif";
                        ctx.fillText(star.name, pt.x + 6, pt.y + 3);
                    }
                }
            });

            // Ciel profond / Galaxies / Amas
            DEEP_SKY.forEach(obj => {
                let pt = skyToCanvasCoords(obj.ra, obj.dec, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                if (pt.visible) {
                    ctx.strokeStyle = "#f472b6";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.ellipse(pt.x, pt.y, 7, 4, Math.PI / 4, 0, 2 * Math.PI);
                    ctx.stroke();

                    if (showLabels) {
                        ctx.fillStyle = "#f472b6";
                        ctx.font = "10px sans-serif";
                        ctx.fillText(obj.name, pt.x + 10, pt.y + 3);
                    }
                }
            });

            // Dessin des Planètes, Lune et du Soleil corrigé
            const spaceObjects = getPlanetsPositions(currentDate);
            spaceObjects.forEach(p => {
                let pt = skyToCanvasCoords(p.ra, p.dec, lst, lat, w, h, viewState.zoom, viewState.offsetX, viewState.offsetY, targetAzimuth);
                if (pt.visible) {
                    ctx.font = "16px Arial, sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    ctx.fillText(p.icon, pt.x, pt.y);

                    ctx.textAlign = "left";
                    ctx.textBaseline = "alphabetic";

                    if (showLabels) {
                        ctx.fillStyle = p.isMoon ? "#94a3b8" : (p.isSun ? "#fde047" : "#fef08a");
                        ctx.font = "bold 11px sans-serif";
                        ctx.fillText(p.name, pt.x + 12, pt.y + 4);
                    }
                }
            });

            // Masque extérieur à l'horizon circulaire
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, baseRadius, 0, 2 * Math.PI);
            ctx.rect(w, 0, -w, h);
            ctx.fillStyle = "#030712";
            ctx.fill();
            ctx.restore();

            ctx.strokeStyle = "rgba(79, 70, 229, 0.4)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, baseRadius, 0, 2 * Math.PI);
            ctx.stroke();
        }

        // --- 5. ENTRÉES ET INTERACTION UTILISATEUR ---
        function updateInputsFromDate() {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            const localISOTime = (new Date(currentDate.getTime() - tzoffset)).toISOString().slice(0, 16);
            document.getElementById('datetime').value = localISOTime;
        }

        updateInputsFromDate();

        document.getElementById('datetime').addEventListener('input', (e) => {
            currentDate = new Date(e.target.value);
            renderSky();
        });

        document.getElementById('cityPreset').addEventListener('change', (e) => {
            const city = CITIES[e.target.value];
            if (city) {
                document.getElementById('lat').value = city.lat;
                document.getElementById('lon').value = city.lon;
                renderSky();
            }
        });

        document.querySelectorAll('#lat, #lon, #showConstellations, #showGrid, #showLabels, #viewAzimuth').forEach(el => {
            el.addEventListener('input', renderSky);
        });

        document.getElementById('btnHourPlus').addEventListener('click', () => { currentDate.setHours(currentDate.getHours() + 1); updateInputsFromDate(); renderSky(); });
        document.getElementById('btnHourMinus').addEventListener('click', () => { currentDate.setHours(currentDate.getHours() - 1); updateInputsFromDate(); renderSky(); });
        document.getElementById('btnDayPlus').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() + 1); updateInputsFromDate(); renderSky(); });
        document.getElementById('btnDayMinus').addEventListener('click', () => { currentDate.setDate(currentDate.getDate() - 1); updateInputsFromDate(); renderSky(); synapticRender(); });
        document.getElementById('btnNow').addEventListener('click', () => { currentDate = new Date(); updateInputsFromDate(); renderSky(); });

        document.getElementById('zoomIn').addEventListener('click', () => { viewState.zoom *= 1.2; renderSky(); });
        document.getElementById('zoomOut').addEventListener('click', () => { viewState.zoom /= 1.2; renderSky(); });
        document.getElementById('resetView').addEventListener('click', () => { viewState.zoom = 1.0; viewState.offsetX = 0; viewState.offsetY = 0; renderSky(); });

        canvas.addEventListener('mousedown', (e) => {
            viewState.isDragging = true;
            viewState.startX = e.clientX - viewState.offsetX;
            viewState.startY = e.clientY - viewState.offsetY;
        });

        window.addEventListener('mouseup', () => { viewState.isDragging = false; });

        canvas.addEventListener('mousemove', (e) => {
            if (!viewState.isDragging) return;
            viewState.offsetX = e.clientX - viewState.startX;
            viewState.offsetY = e.clientY - viewState.startY;
            renderSky();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) viewState.zoom *= 1.1;
            else viewState.zoom /= 1.1;
            viewState.zoom = Math.max(0.5, Math.min(viewState.zoom, 10));
            renderSky();
        });

        window.addEventListener('resize', renderSky);

        lucide.createIcons();
        renderSky();
    </script>
