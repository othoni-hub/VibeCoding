<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.I.M.O.N. - Modern Edition</title>
    <style>
        :root {
            --bg-color: #12121a;
            --board-bg: #09090d;
            --pad-glow: 0 0 35px rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; 
        }

        .game-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
            max-width: 400px;
            padding: 10px;
        }

        header h1 {
            margin: 0 0 0.2rem 0;
            font-size: 2.2rem;
            letter-spacing: 8px;
            background: linear-gradient(45deg, #00ff88, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .acronym-definition {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666675;
            margin-bottom: 0.5rem;
            max-width: 280px;
            line-height: 1.3;
        }

        .score-board {
            display: flex;
            gap: 2rem;
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: #a0a0b0;
        }

        .score-box span {
            color: #fff;
        }

        .simon-board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            background: var(--board-bg);
            padding: 20px;
            border-radius: 50%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            width: 90vw;
            height: 90vw;
            max-width: 340px;
            max-height: 340px;
        }

        .pad {
            border-radius: 35px; 
            cursor: pointer;
            transition: transform 0.05s ease, filter 0.1s ease, opacity 0.1s ease;
            opacity: 0.3;
            filter: brightness(0.6) saturate(0.8);
            touch-action: manipulation; 
        }

        .green  { background: #00ff88; border-bottom-right-radius: 12px; }
        .red    { background: #ff3366; border-bottom-left-radius: 12px; }
        .yellow { background: #ffea00; border-top-right-radius: 12px; }
        .blue   { background: #00bfff; border-top-left-radius: 12px; }

        .pad.active {
            opacity: 1;
            filter: brightness(1.4) saturate(1.2);
            box-shadow: var(--pad-glow);
            transform: scale(0.96);
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: var(--bg-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            border: 4px solid var(--board-bg);
        }

        #start-btn {
            background: #fff;
            border: none;
            color: #12121a;
            padding: 10px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        footer {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #4c4c59;
            line-height: 1.5;
        }

        .credits {
            margin-top: 0.6rem;
            font-size: 0.75rem;
            color: #555566;
            border-top: 1px solid #1f1f2e;
            padding-top: 0.6rem;
        }

        .desktop-hint {
            display: inline;
        }

        @media (pointer: coarse) {
            .desktop-hint { display: none; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <h1>S.I.M.O.N.</h1>
            <div class="acronym-definition">
                Séquenceur Interactif Mnémotechnique à Ondes Numériques
            </div>
            <div class="score-board">
                <div class="score-box">SCORE: <span id="current-score">00</span></div>
                <div class="score-box">BEST: <span id="best-score">00</span></div>
            </div>
        </header>

        <div class="simon-board">
            <div class="pad green" data-color="green"></div>
            <div class="pad red" data-color="red"></div>
            <div class="pad yellow" data-color="yellow"></div>
            <div class="pad blue" data-color="blue"></div>
            <div class="center-circle">
                <button id="start-btn">START</button>
            </div>
        </div>

        <footer>
            <p>Appuyez sur START pour lancer.<br><span class="desktop-hint">Clavier : <strong>Q • S • D • F</strong></span></p>
            <div class="credits">
                Créé par Olivier Thöni, vibe-codé avec l’aide de Gemini 3.5 Flash
            </div>
        </footer>
    </div>

    <script>
        const SOUNDS = {
            green: 415.30,  
            red: 311.13,    
            yellow: 247.94, 
            blue: 209.30    
        };

        const KEY_MAP = { 'q': 'green', 's': 'red', 'd': 'yellow', 'f': 'blue' };

        let audioCtx = null;
        let gameSequence = [];
        let playerSequence = [];
        let score = 0;
        let bestScore = localStorage.getItem('simon-best') || 0;
        let isPlayingSequence = false;
        let gameActive = false;

        document.getElementById('best-score').textContent = String(bestScore).padStart(2, '0');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(color, duration = 250) {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(SOUNDS[color], audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration / 1000);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration / 1000);
            } catch(e) {
                console.log("Audio Error:", e);
            }
        }

        function activatePad(color) {
            const pad = document.querySelector(`.pad.${color}`);
            if(pad) {
                pad.classList.add('active');
                playTone(color, 220);
                setTimeout(() => pad.classList.remove('active'), 220);
            }
        }

        document.getElementById('start-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            initAudio();
            
            gameSequence = [];
            score = 0;
            updateScoreDisplay();
            gameActive = true;
            
            setTimeout(nextRound, 300);
        });

        function nextRound() {
            playerSequence = [];
            isPlayingSequence = true;
            
            const colors = ['green', 'red', 'yellow', 'blue'];
            gameSequence.push(colors[Math.floor(Math.random() * colors.length)]);
            
            const speed = Math.max(180, 550 - (score * 25));
            
            gameSequence.forEach((color, index) => {
                setTimeout(() => {
                    activatePad(color);
                    if (index === gameSequence.length - 1) {
                        setTimeout(() => isPlayingSequence = false, speed);
                    }
                }, (index + 1) * (speed + 120));
            });
        }

        function handleInput(color) {
            if (!gameActive || isPlayingSequence) return;
            
            activatePad(color);
            playerSequence.push(color);
            
            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] !== gameSequence[currentIndex]) {
                gameOver();
                return;
            }
            
            if (playerSequence.length === gameSequence.length) {
                score++;
                updateScoreDisplay();
                setTimeout(nextRound, 700);
            }
        }

        function gameOver() {
            gameActive = false;
            
            if (audioCtx) {
                try {
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    osc.frequency.setValueAtTime(42, audioCtx.currentTime);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                } catch(e){}
            }
            
            document.body.style.background = '#3a0d15';
            setTimeout(() => document.body.style.background = '#12121a', 250);
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('simon-best', bestScore);
                document.getElementById('best-score').textContent = String(bestScore).padStart(2, '0');
            }
            
            setTimeout(() => {
                alert(`Game Over ! Score final : ${score}`);
            }, 100);
        }

        function updateScoreDisplay() {
            document.getElementById('current-score').textContent = String(score).padStart(2, '0');
        }

        document.querySelectorAll('.pad').forEach(pad => {
            pad.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                initAudio(); 
                handleInput(e.target.dataset.color);
            });
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (KEY_MAP[key]) {
                initAudio();
                handleInput(KEY_MAP[key]);
            }
        });
    </script>
</body>
</html>
