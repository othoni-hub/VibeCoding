<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>S.Y.S.M.O. | Système Solaire</title>
    <style>
        body { margin: 0; background: #000; color: #eee; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; z-index: 10; border: 1px solid #00d4ff; }
        #popup { display: none; position: absolute; background: rgba(20,20,20,0.95); padding: 15px; border: 1px solid #00d4ff; border-radius: 8px; color: white; width: 250px; }
        h1 { margin: 0 0 10px 0; font-size: 1.2em; color: #00d4ff; letter-spacing: 2px; }
        button { cursor: pointer; background: #00d4ff; border: none; padding: 6px 12px; border-radius: 4px; margin-top: 10px; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="ui">
    <h1>S.Y.S.M.O.</h1>
    Vitesse: <input type="range" id="speed" min="0" max="1000" value="1"> <span id="val">1</span> j/min<br>
    <button onclick="focusedPlanet = null">Vue d'ensemble</button>
</div>

<div id="popup">
    <h2 id="pName" style="color:#00d4ff; margin-top:0;"></h2>
    <div id="pData" style="margin-bottom:10px;"></div>
    <button onclick="setFocus()">Suivre cette planète</button>
    <button onclick="document.getElementById('popup').style.display='none'" style="background:#555">Fermer</button>
</div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0x444444));
    const sunLight = new THREE.PointLight(0xffffff, 2, 1000);
    scene.add(sunLight);

    const planets = [
        {name: "Mercure", color: 0xAAAAAA, dist: 30, size: 1.5, period: 88, rot: 58, mass: "0.05 M⊕"},
        {name: "Vénus", color: 0xE3BB76, dist: 50, size: 2.5, period: 225, rot: 243, mass: "0.81 M⊕"},
        {name: "Terre", color: 0x2271B3, dist: 70, size: 2.5, period: 365, rot: 1, mass: "1.00 M⊕", hasMoon: true},
        {name: "Mars", color: 0xE27B58, dist: 90, size: 2, period: 687, rot: 1.03, mass: "0.10 M⊕"},
        {name: "Jupiter", color: 0xD39C7E, dist: 130, size: 6, period: 4333, rot: 0.4, mass: "317 M⊕"},
        {name: "Saturne", color: 0xC5AB6E, dist: 170, size: 5, period: 10759, rot: 0.45, mass: "95 M⊕"},
        {name: "Uranus", color: 0xBBE1E4, dist: 210, size: 3.5, period: 30687, rot: 0.7, mass: "14.5 M⊕"},
        {name: "Neptune", color: 0x6081FF, dist: 250, size: 3.5, period: 60190, rot: 0.6, mass: "17.1 M⊕"}
    ];

    let speed = 1, focusedPlanet = null;
    
    // Initialisation des planètes et de leurs traînées
    const planetMeshes = planets.map(p => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 32, 32), new THREE.MeshStandardMaterial({ color: p.color }));
        scene.add(mesh);
        
        // Traînées : liste de points
        const trailPoints = [];
        const trailGeom = new THREE.BufferGeometry();
        const trailMat = new THREE.LineBasicMaterial({ color: p.color, transparent: true, opacity: 0.5 });
        const trail = new THREE.Line(trailGeom, trailMat);
        scene.add(trail);

        return { ...p, mesh, angle: Math.random() * Math.PI * 2, trailPoints, trail };
    });

    const sun = new THREE.Mesh(new THREE.SphereGeometry(10, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
    scene.add(sun);
    camera.position.set(200, 200, 200);

    function setFocus() {
        const name = document.getElementById('pName').innerText;
        focusedPlanet = planetMeshes.find(p => p.name === name);
        document.getElementById('popup').style.display = 'none';
    }

    function animate() {
        requestAnimationFrame(animate);
        
        planetMeshes.forEach(p => {
            p.angle += (2 * Math.PI / p.period) * (speed / 60);
            p.mesh.position.x = Math.cos(p.angle) * p.dist;
            p.mesh.position.z = Math.sin(p.angle) * p.dist;
            
            // Mise à jour de la traînée
            p.trailPoints.push(p.mesh.position.clone());
            if (p.trailPoints.length > 200) p.trailPoints.shift();
            p.trail.geometry.setFromPoints(p.trailPoints);
        });

        if (focusedPlanet) controls.target.copy(focusedPlanet.mesh.position);
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('click', (e) => {
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(planetMeshes.map(p => p.mesh));
        if (intersects.length > 0) {
            const found = planetMeshes.find(p => p.mesh === intersects[0].object);
            const p = document.getElementById('popup');
            p.style.display = 'block';
            p.style.left = (e.clientX + 20) + 'px';
            p.style.top = (e.clientY + 20) + 'px';
            document.getElementById('pName').innerText = found.name;
            document.getElementById('pData').innerHTML = `Rév: ${found.period}j<br>Rot: ${found.rot}j<br>Masse: ${found.mass}`;
        }
    });

    document.getElementById('speed').oninput = (e) => { speed = e.target.value; document.getElementById('val').innerText = speed; };
    animate();
</script>
</body>
</html>
