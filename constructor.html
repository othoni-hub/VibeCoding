<style>

<body>
<div id="root"></div>
<script>

const {
  useState,
  useRef,
  useEffect,
  useCallback,
  useReducer
} = React;

// ============================================================
// AUTO-NAMING
// ============================================================
const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
function toSub(n) {
  return String(n).split("").map(d => "₀₁₂₃₄₅₆₇₈₉"[+d]).join("");
}
function nextPointLbl(objs) {
  const used = new Set(objs.filter(o => o.type === "point" || o.type === "intersection").map(o => o.label));
  for (let p = 0; p < 10; p++) {
    const s = "'".repeat(p);
    for (let i = 0; i < 26; i++) {
      const l = LETTERS[i] + s;
      if (!used.has(l)) return l;
    }
  }
  return "P";
}
function nextLineLbl(objs) {
  const used = new Set(objs.filter(o => o.type === "line").map(o => o.label));
  if (!used.has("(d)")) return "(d)";
  for (let n = 1; n < 999; n++) {
    const l = `(d${toSub(n)})`;
    if (!used.has(l)) return l;
  }
}
function nextCircleLbl(objs) {
  const used = new Set(objs.filter(o => o.type === "circle").map(o => o.label));
  if (!used.has("(c)")) return "(c)";
  for (let n = 1; n < 999; n++) {
    const l = `(c${toSub(n)})`;
    if (!used.has(l)) return l;
  }
}

// ============================================================
// GEOMETRY ENGINE
// ============================================================
const d2 = (a, b) => Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
function llX(p1, p2, p3, p4) {
  const d1x = p2.x - p1.x,
    d1y = p2.y - p1.y,
    d2x = p4.x - p3.x,
    d2y = p4.y - p3.y;
  const cr = d1x * d2y - d1y * d2x;
  if (Math.abs(cr) < 1e-10) return null;
  const t = ((p3.x - p1.x) * d2y - (p3.y - p1.y) * d2x) / cr;
  return {
    x: p1.x + t * d1x,
    y: p1.y + t * d1y
  };
}
function ccX(c1, r1, c2, r2) {
  const d = d2(c1, c2);
  if (d > r1 + r2 + 1e-10 || d < Math.abs(r1 - r2) - 1e-10 || d < 1e-10) return [];
  const a = (r1 * r1 - r2 * r2 + d * d) / (2 * d),
    h = Math.sqrt(Math.max(0, r1 * r1 - a * a));
  const mx = c1.x + a / d * (c2.x - c1.x),
    my = c1.y + a / d * (c2.y - c1.y);
  const dx = h / d * (c2.y - c1.y),
    dy = h / d * (c2.x - c1.x);
  if (h < 1e-10) return [{
    x: mx,
    y: my
  }];
  return [{
    x: mx + dx,
    y: my - dy
  }, {
    x: mx - dx,
    y: my + dy
  }];
}
function lcX(p1, p2, ctr, rad) {
  const dx = p2.x - p1.x,
    dy = p2.y - p1.y,
    fx = p1.x - ctr.x,
    fy = p1.y - ctr.y;
  const a = dx * dx + dy * dy,
    b = 2 * (fx * dx + fy * dy),
    c = fx * fx + fy * fy - rad * rad;
  const disc = b * b - 4 * a * c;
  if (disc < -1e-10) return [];
  const sq = Math.sqrt(Math.max(0, disc)),
    t1 = (-b - sq) / (2 * a),
    t2 = (-b + sq) / (2 * a);
  if (Math.abs(disc) < 1e-10) return [{
    x: p1.x + t1 * dx,
    y: p1.y + t1 * dy
  }];
  return [{
    x: p1.x + t1 * dx,
    y: p1.y + t1 * dy
  }, {
    x: p1.x + t2 * dx,
    y: p1.y + t2 * dy
  }];
}
function compInterPos(obj, objs) {
  const a = objs.find(o => o.id === obj.parentIds[0]),
    b = objs.find(o => o.id === obj.parentIds[1]);
  if (!a || !b) return null;
  const ag = getGeom(a, objs),
    bg = getGeom(b, objs);
  if (!ag || !bg) return null;
  let pts = [];
  if (a.type === "line" && b.type === "line") {
    const ip = llX(ag.p1, ag.p2, bg.p1, bg.p2);
    if (ip) pts = [ip];
  } else if (a.type === "circle" && b.type === "circle") pts = ccX(ag.center, ag.radius, bg.center, bg.radius);else {
    const ln = a.type === "line" ? ag : bg,
      ci = a.type === "circle" ? ag : bg;
    pts = lcX(ln.p1, ln.p2, ci.center, ci.radius);
  }
  if (!pts.length) return null;
  const idx = obj.intersectionIndex || 0;
  return idx < pts.length ? pts[idx] : pts[0];
}
function getPt(obj, objs) {
  if (obj.type === "point") return {
    x: obj.x,
    y: obj.y
  };
  if (obj.type === "intersection") return compInterPos(obj, objs);
  return null;
}
function getGeom(obj, objs) {
  if (obj.type === "point") return {
    x: obj.x,
    y: obj.y
  };
  if (obj.type === "intersection") return compInterPos(obj, objs);
  if (obj.type === "line") {
    const p1 = objs.find(o => o.id === obj.parentIds[0]),
      p2 = objs.find(o => o.id === obj.parentIds[1]);
    if (!p1 || !p2) return null;
    const pp1 = getPt(p1, objs),
      pp2 = getPt(p2, objs);
    if (!pp1 || !pp2) return null;
    return {
      p1: pp1,
      p2: pp2
    };
  }
  if (obj.type === "circle") {
    const c = objs.find(o => o.id === obj.parentIds[0]),
      r = objs.find(o => o.id === obj.parentIds[1]);
    if (!c || !r) return null;
    const cp = getPt(c, objs),
      rp = getPt(r, objs);
    if (!cp || !rp) return null;
    return {
      center: cp,
      radius: d2(cp, rp)
    };
  }
  return null;
}
function propagate(objs, movedId) {
  const res = [...objs],
    queue = [];
  function col(id) {
    res.forEach(o => {
      if (o.parentIds?.includes(id) && !queue.includes(o.id)) {
        queue.push(o.id);
        col(o.id);
      }
    });
  }
  col(movedId);
  queue.forEach(id => {
    const i = res.findIndex(o => o.id === id);
    if (i >= 0 && res[i].type === "intersection") {
      const p = compInterPos(res[i], res);
      if (p) res[i] = {
        ...res[i],
        computedX: p.x,
        computedY: p.y
      };
    }
  });
  return res;
}

// ============================================================
// FORGED TOOL REPLAY ENGINE
// ============================================================
// A forged tool stores:
//   steps: array of object ids created during forge (in order)
//   inputs: [{ id, label, type, role }]  — the "parameter" objects
//   outputs: [{ id, label, type, role }] — the "result" objects
//
// When applying a forged tool:
//   1. User clicks objects matching each input type in sequence
//   2. We replay each step, remapping parentIds from original input ids → new input ids
//   3. New objects are added to the canvas

function applyForgedTool(ft, inputBindings, existingObjects) {
  // inputBindings: { [originalInputId]: newObjectId }
  // ft.outputs[].id = original IDs of output objects — everything else is hidden construction
  const outputOriginalIds = new Set((ft.outputs || []).map(o => o.id));
  const idMap = {
    ...inputBindings
  };
  const newObjects = [];
  let currentObjs = [...existingObjects];
  ft.steps.forEach(step => {
    // Skip input objects — they are already on canvas
    if (idMap[step.id]) return;
    const remapIds = ids => ids.map(pid => idMap[pid] || pid);
    // Construction steps are hidden; only designated outputs are visible
    const isOutput = outputOriginalIds.has(step.id);
    const visibility = isOutput ? "visible" : "hidden";
    let newObj = null;
    if (step.type === "point") {
      const lbl = isOutput ? nextPointLbl([...currentObjs, ...newObjects]) : step.label;
      newObj = {
        ...step,
        id: uid(),
        label: lbl,
        visibility
      };
      newObjects.push(newObj);
      currentObjs = [...currentObjs, newObj];
      idMap[step.id] = newObj.id;
    } else if (step.type === "line") {
      const lbl = isOutput ? nextLineLbl([...currentObjs, ...newObjects]) : step.label;
      newObj = {
        ...step,
        id: uid(),
        label: lbl,
        visibility,
        parentIds: remapIds(step.parentIds)
      };
      newObjects.push(newObj);
      currentObjs = [...currentObjs, newObj];
      idMap[step.id] = newObj.id;
    } else if (step.type === "circle") {
      const lbl = isOutput ? nextCircleLbl([...currentObjs, ...newObjects]) : step.label;
      newObj = {
        ...step,
        id: uid(),
        label: lbl,
        visibility,
        parentIds: remapIds(step.parentIds)
      };
      newObjects.push(newObj);
      currentObjs = [...currentObjs, newObj];
      idMap[step.id] = newObj.id;
    } else if (step.type === "intersection") {
      const lbl = isOutput ? nextPointLbl([...currentObjs, ...newObjects]) : step.label;
      const remappedParents = remapIds(step.parentIds);
      let computedX = step.computedX,
        computedY = step.computedY;
      const pos = compInterPos({
        ...step,
        parentIds: remappedParents
      }, currentObjs);
      if (pos) {
        computedX = pos.x;
        computedY = pos.y;
      }
      newObj = {
        ...step,
        id: uid(),
        label: lbl,
        visibility,
        parentIds: remappedParents,
        computedX,
        computedY
      };
      newObjects.push(newObj);
      currentObjs = [...currentObjs, newObj];
      idMap[step.id] = newObj.id;
    }
  });
  return newObjects;
}

// ============================================================
// REDUCER
// ============================================================
function geoReducer(s, a) {
  switch (a.type) {
    case "ADD":
      return {
        ...s,
        objects: [...s.objects, a.obj]
      };
    case "ADD_MANY":
      return {
        ...s,
        objects: [...s.objects, ...a.objs]
      };
    case "MOVE":
      {
        let o = s.objects.map(x => x.id === a.id ? {
          ...x,
          x: a.x,
          y: a.y
        } : x);
        return {
          ...s,
          objects: propagate(o, a.id)
        };
      }
    case "VIS":
      return {
        ...s,
        objects: s.objects.map(o => o.id === a.id ? {
          ...o,
          visibility: a.vis
        } : o)
