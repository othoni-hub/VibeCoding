        // Dictionnaire d'icônes et couleurs pour les catégories
        const categories = {
            philosophie: { bg: 'bg-amber-100', text: 'text-amber-800', border: 'border-amber-400', icon: 'fa-book-open', label: 'Philosophie & Lettres' },
            sciences: { bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-400', icon: 'fa-flask', label: 'Sciences & Innovations' },
            politique: { bg: 'bg-red-100', text: 'text-red-800', border: 'border-red-400', icon: 'fa-gavel', label: 'Politique & Société' },
            arts: { bg: 'bg-purple-100', text: 'text-purple-800', border: 'border-purple-400', icon: 'fa-palette', label: 'Arts & Musique' }
        };

        // Génération de la Frise Chronologique
        function renderTimeline(events) {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            if (events.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 py-8">Aucun événement ne correspond à ce filtre.</p>`;
                return;
            }

            events.forEach((event, index) => {
                const cat = categories[event.category];
                
                const eventBlock = document.createElement('div');
                eventBlock.className = "relative pl-6 md:pl-8 group animate-fade-in";
                
                eventBlock.innerHTML = `
                    <!-- Indicateur de date sur la gauche -->
                    <div class="absolute -left-[18px] top-1.5 bg-white border-4 ${cat.border} rounded-full w-8 h-8 flex items-center justify-center z-10 group-hover:scale-110 transition-transform shadow-sm">
                        <i class="fa-solid ${cat.icon} text-xs ${cat.text}"></i>
                    </div>
                    
                    <!-- Date pour affichage desktop décalé -->
                    <div class="hidden md:block absolute -left-32 top-1 w-24 text-right font-bold text-xl text-[#1e293b] tracking-tight">
                        ${event.year}
                    </div>

                    <!-- Carte de l'événement -->
                    <div onclick="openModal(${event.id})" class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm hover:shadow-md transition-all cursor-pointer transform hover:-translate-y-0.5 flex flex-col md:flex-row gap-5 items-start">
                        
                        <!-- Image miniature de l'époque -->
                        <div class="w-full md:w-32 h-24 rounded-lg overflow-hidden flex-shrink-0 bg-gray-100 shadow-inner">
                            <img src="${event.img}" alt="${event.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                        </div>

                        <!-- Contenu textuel -->
                        <div class="flex-1">
                            <div class="flex flex-wrap gap-2 items-center mb-1">
                                <span class="md:hidden font-bold text-lg text-[#1e293b] mr-2">${event.year}</span>
                                <span class="${cat.bg} ${cat.text} text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full">
                                    ${cat.label}
                                </span>
                            </div>
                            <h3 class="serif-title text-lg md:text-xl font-bold text-gray-900 group-hover:text-[#c2a649] transition-colors">
                                ${event.title}
                            </h3>
                            <p class="text-xs text-gray-400 mt-0.5">Par : ${event.author}</p>
                            <p class="text-sm text-gray-600 mt-2 line-clamp-2">${event.short}</p>
                            
                            <span class="inline-flex items-center text-xs font-semibold text-[#c2a649] mt-3 group-hover:underline">
                                Voir la fiche détaillée <i class="fa-solid fa-arrow-right ml-1 text-[10px]"></i>
                            </span>
                        </div>
                    </div>
                `;
                container.appendChild(eventBlock);
            });
        }

        // Système de Filtrage
        function filterEvents(category) {
            // Mise à jour de l'état graphique des boutons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-800 hover:bg-gray-100 transition-all shadow-md";
            });
            
            const activeBtn = document.getElementById(`btn-${category}`);
            if(category === 'all') {
                activeBtn.className = "filter-btn px-4 py-2 rounded-full text-sm font-medium bg-[#c2a649] text-white transition-all shadow-md";
                renderTimeline(eventsData);
            } else {
                const colors = { philosophie: 'bg-amber-600', sciences: 'bg-blue-600', politique: 'bg-red-600', arts: 'bg-purple-600' };
                activeBtn.className = `filter-btn px-4 py-2 rounded-full text-sm font-medium ${colors[category]} text-white transition-all shadow-md`;
                
                const filtered = eventsData.filter(e => e.category === category);
                renderTimeline(filtered);
            }
        }

        // Gestion de la Modal (Fiches Détaillées)
        function openModal(id) {
            const event = eventsData.find(e => e.id === id);
            if (!event) return;

            const cat = categories[event.category];

            document.getElementById('modal-img').src = event.img;
            document.getElementById('modal-img').alt = event.title;
            document.getElementById('modal-title').innerText = event.title;
            document.getElementById('modal-date').innerText = event.year;
            document.getElementById('modal-author').innerText = `Auteur / Acteur majeur : ${event.author}`;
            
            // Formatage de la description
            document.getElementById('modal-desc').innerHTML = `<p class="serif-text text-lg italic text-gray-600 border-l-4 border-gray-300 pl-3 my-2">${event.short}</p><p>${event.desc}</p>`;
            document.getElementById('modal-impact').innerHTML = `<i class="fa-solid fa-graduation-cap text-[#c2a649] mr-2 text-base"></i><strong>Pédagogie :</strong> ${event.impact.replace('Portée pédagogique : ', '')}`;
            
            // Badge de catégorie
            const badge = document.getElementById('modal-badge');
            badge.className = `px-3 py-1 rounded-full text-xs font-semibold text-white uppercase tracking-wider ${cat.bg.replace('100', '600')}`;
            badge.innerText = cat.label;

            // Affichage
            const modal = document.getElementById('event-modal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('event-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        document.getElementById('event-modal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if(e.key === "Escape") closeModal();
        });

        window.onload = () => {
            renderTimeline(eventsData);
        };
    </script>
