<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ GIF Maker Express (Proportions Gardées)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #8b5cf6;
            --text: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .upload-btn {
            display: block;
            background: linear-gradient(135deg, #6366f1, var(--accent));
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }
        input[type="file"] { display: none; }
        .controls {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        label { font-size: 0.9rem; opacity: 0.8; }
        input[type="range"] { width: 60%; }
        button.generate {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }
        #preview-container {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        #preview-gif {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .download-btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
        }
        .status { text-align: center; color: #a78bfa; margin: 10px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ GIF Maker Express</h1>
    
    <label class="upload-btn" for="photo-input">📸 Choisir des photos (Max 20)</label>
    <input type="file" id="photo-input" accept="image/*" multiple>
    
    <div id="status" class="status"></div>

    <div class="controls">
        <label for="speed">Vitesse (Intervalle) :</label>
        <input type="range" id="speed" min="0.1" max="1" step="0.1" value="0.3">
        <span id="speed-val">0.3s</span>
    </div>

    <button id="generate-btn" class="generate">Créer le GIF ✨</button>

    <div id="preview-container">
        <h3>Votre GIF est prêt ! 🎉</h3>
        <img id="preview-gif" src="" alt="Mon super GIF"><br>
        <a id="download-link" class="download-btn" download="mon-super-gif.gif">Télécharger le GIF</a>
    </div>
</div>

<script>
    const photoInput = document.getElementById('photo-input');
    const generateBtn = document.getElementById('generate-btn');
    const statusDiv = document.getElementById('status');
    const previewContainer = document.getElementById('preview-container');
    const previewGif = document.getElementById('preview-gif');
    const downloadLink = document.getElementById('download-link');
    const speedInput = document.getElementById('speed');
    const speedVal = document.getElementById('speed-val');

    let imagesBase64 = [];
    const MAX_DIMENSION = 600; // Taille max (largeur ou hauteur) pour garder un fichier léger sur mobile

    speedInput.addEventListener('input', () => {
        speedVal.textContent = `${speedInput.value}s`;
    });

    photoInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files).slice(0, 20);
        if (files.length === 0) return;

        imagesBase64 = [];
        statusDiv.textContent = `Traitement et respect des ratios...`;
        generateBtn.style.display = 'none';
        previewContainer.style.display = 'none';

        for (const file of files) {
            try {
                const processedBase64 = await processAndKeepRatio(file, MAX_DIMENSION);
                imagesBase64.push(processedBase64);
            } catch (err) {
                console.error("Erreur traitement image:", err);
            }
        }

        statusDiv.textContent = `${imagesBase64.length} image(s) prête(s) sans déformation !`;
        generateBtn.style.display = 'block';
    });

    generateBtn.addEventListener('click', () => {
        if (imagesBase64.length === 0) return;

        statusDiv.textContent = "Génération du GIF... Ça vibre fort 🚀";
        generateBtn.disabled = true;

        gifshot.createGIF({
            images: imagesBase64,
            interval: parseFloat(speedInput.value),
            gifWidth: MAX_DIMENSION,
            gifHeight: MAX_DIMENSION,
            numWorkers: 2
        }, function (obj) {
            if (!obj.error) {
                previewGif.src = obj.image;
                downloadLink.href = obj.image;
                statusDiv.textContent = "Terminé !";
                previewContainer.style.display = 'block';
            } else {
                statusDiv.textContent = "Erreur lors de la génération.";
            }
            generateBtn.disabled = false;
        });
    });

    // LA FONCTION MAGIQUE : Elle dessine l'image sur un canvas carré en mode "contain" (comme le CSS object-fit: contain)
    function processAndKeepRatio(file, targetSize) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = targetSize;
                    canvas.height = targetSize;
                    const ctx = canvas.getContext('2d');

                    // Fond noir pour combler les vides (tu peux mettre '#ffffff' pour du blanc)
                    ctx.fillStyle = '#000000'; 
                    ctx.fillRect(0, 0, targetSize, targetSize);

                    // Calcul des proportions (Letterboxing / Pillarboxing)
                    const hRatio = targetSize / img.width;
                    const vRatio = targetSize / img.height;
                    const ratio  = Math.min(hRatio, vRatio); // Utilise le plus petit ratio pour ne pas déborder

                    const centerShift_x = (targetSize - img.width * ratio) / 2;
                    const centerShift_y = (targetSize - img.height * ratio) / 2;  

                    // On dessine l'image parfaitement centrée et proportionnée
                    ctx.drawImage(img, 0, 0, img.width, img.height,
                                       centerShift_x, centerShift_y, img.width * ratio, img.height * ratio);  
                    
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            };
            reader.onerror = error => reject(error);
        });
    }
</script>
</body>
</html>
